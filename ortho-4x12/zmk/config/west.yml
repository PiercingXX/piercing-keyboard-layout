manifest:
  remotes:
    - name: petejohanson
      url-base: https://github.com/petejohanson
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
    - name: blank-slate-zmk-module
      remote: petejohanson
      revision: v0.3
  self:
    # Must be the path of this directory relative to the repo root, not the
    # bare "config" a top-level zmk-config uses. ZMK's build-user-config
    # workflow runs `west init -l <repo>/<config_path>` from the repo root,
    # and west places the workspace top at <manifest dir> minus self.path —
    # so "config" would put the top at ortho-4x12/zmk and the following
    # `west update` (which runs from the repo root) fails to find it.
    path: ortho-4x12/zmk/config
