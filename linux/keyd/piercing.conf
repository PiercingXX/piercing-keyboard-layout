# Piercing layout as a keyd remap — system-wide, at the evdev level.
# Covers everything xkb can't reach user-level: the GDM login screen,
# virtual consoles (TTYs), and any compositor, for all users.
#
# IMPORTANT: this REPLACES the xkb layout. With keyd doing the remap,
# leave the session's input source on plain "English (US)" — running both
# remaps letters twice. (On-screen keyboards bypass keyd, so touch-first
# devices should stay on the xkb + OSK setup instead.)
#
# Left-hand side = physical key (QWERTY keycap), right-hand side = what it
# types. Identity mappings (q, a, s, v, m, h...) are omitted.
#
#   ` !9 @7 #5 $3 %1 ^0 &2 *4 (6 )8 -_ =+  [Delete]
#   q  r  f  w  g  ;  l  p  y  z  [  ]  \
#   ⌫  a  s  e  t  d  h  n  u  i  o  '        (Backspace on old Caps)
#   ,  c  x  v  /  k  m  b  j  .
#
# AltGr + the keys that TYPE h/j/k/l = ← ↓ ↑ →.

[ids]
*

[main]
# editing keys
capslock = backspace
backspace = delete

# number row: symbols unshifted (digits move to the shift layer below)
1 = S-1
2 = S-2
3 = S-3
4 = S-4
5 = S-5
6 = S-6
7 = S-7
8 = S-8
9 = S-9
0 = S-0

# top row: q r f w g ; l p y z
w = r
e = f
r = w
t = g
y = semicolon
u = l
i = p
o = y
p = z

# home row: a s e t d h n u i o
d = e
f = t
g = d
j = n
k = u
l = i
semicolon = o

# bottom row: , c x v / k m b j .
z = comma
x = c
c = x
b = slash
n = k
comma = b
dot = j
slash = dot

# ISO extra key next to left shift, if present
102nd = minus

[shift]
# digits radiate from the center: odd left, even right — 9 7 5 3 1 | 0 2 4 6 8
1 = 9
2 = 7
3 = 5
4 = 3
5 = 1
6 = 0
7 = 2
8 = 4
9 = 6
0 = 8

[altgr]
# vim arrows on the keys that type h/j/k/l
h = left
dot = down
n = up
u = right
