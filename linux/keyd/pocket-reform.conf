# Piercing layout for the MNT Pocket Reform internal keyboard (keyd).
# GitHub.com/PiercingXX
#
# Targets ONLY the internal keyboard (RP2040, "MNT Pocket Reform Input").
# External keyboards keep the standard Piercing mapping from default.conf.
#
# The Pocket keyboard is a 5x12 ortholinear grid — the same shape as the
# Preonic — so this is the ortho-5x12 Piercing layout mapped position-for-
# position onto the scancodes the stock MNT firmware sends
# (pocket-hid/src/matrix.h). Rendered result:
#
#   `~  !9  @7  #5  $3  %1  ^0  &2  *4  (6  )8  Del
#   Tab  q   r   f   w   g   ;:  l   p   y   z   Play
#   Bksp a   s   e   t   d   h   n   u   i   o   '"
#   Shft ,L1 cL2 x   v   /?  k   m   b   j   .>  Shft
#   [○] Ctrl Sup Alt AltGr [  Space  ] PrtSc Mute V- V+ Esc
#
#   Trackball: [Enter] [L-click] (ball) [scroll] [R-click]
#
# Deviations from the Preonic forced by hardware:
#   - The bottom-left ○ key IS the firmware Hyper key: its matrix slot
#     holds KEY_COMPOSE but main.c intercepts that code to switch layers
#     and never reports it over USB. It cannot be remapped, so the mod
#     block sits one key right of the Preonic's (Ctrl lands on the key
#     MNT labels Super, etc).
#   - Both Space keys send the same scancode (KEY_SPACE), so they can't
#     be split into Enter+Space — both stay Space. Enter lives on the
#     outer-left trackball button (stock middle-click) instead, with
#     L1+Space as the keyboard fallback.
#   - The physical arrow keycaps type PrtSc/Mute/Vol/Esc — arrows live on
#     AltGr + the keys that TYPE h j k l, exactly like every other board.
#   - The Hyper firmware layer (F1-F13 on digits, Home/End/PgUp/PgDn on
#     arrows, Hyper+Enter = OLED menu) passes through untouched.
#
# Hold-layers mirror the Preonic Vial keymap:
#   hold the ,-key (L1): F12 F1-F10 Ins / arrows / - = \ ` [ ] / Play
#   hold the c-key (L2): numpad
#
# Left side = stock scancode the firmware sends, right side = final output.

[ids]
1209:6d06
# The trackball is the mouse interface of the same USB device; the m:
# prefix opts it in so the Enter-on-middle-button remap works. keyd calls
# mouse support experimental — if the pointer or scrolling misbehaves,
# delete this line plus the middlemouse/leftmouse mappings below.
m:1209:6d06

[main]
# ---- row 1: Esc 1..0 Backspace -> `~, symbols (digits on shift), Delete
esc = grave
1 = S-1
2 = S-2
3 = S-3
4 = S-4
5 = S-5
6 = S-6
7 = S-7
8 = S-8
9 = S-9
0 = S-0
backspace = delete

# ---- row 2: Tab q..p ; -> Tab, top-row letters, Play
w = r
e = f
r = w
t = g
y = semicolon
u = l
i = p
o = y
p = z
semicolon = playpause

# ---- row 3: Ctrl a..l ' Enter -> Backspace, home row, '"
# (the key MNT labels Ctrl sits where Caps Lock lives on ANSI — it becomes
# Backspace, the strongest position for the most-used editing key)
leftcontrol = backspace
d = e
f = t
g = d
j = n
k = u
l = i
apostrophe = o
enter = apostrophe

# ---- row 4: Shift z..m , . Up AltGr -> Shift, bottom row, Shift
z = overload(fn1, comma)
x = overload(fn2, c)
c = x
b = slash
n = k
comma = b
dot = j
up = dot
rightalt = rightshift

# ---- row 5: [○] Sup Alt \ = Spc Spc - / Left Down Right
# The ○ key never reaches the OS, so the mod block shifts one key right.
leftmeta = leftcontrol
leftalt = leftmeta
backslash = leftalt
equal = rightalt
minus = sysrq
slash = mute
left = volumedown
down = volumeup
right = esc

# ---- trackball: Enter on the outer-left button (stock middle-click).
# Left/right click and the scroll-hold button stay stock; scroll never
# reaches the OS (firmware-local, like ○). Firmware quirk: holding
# scroll while pressing this Enter button still toggles the firmware's
# sticky-scroll mode.
middlemouse = enter

[shift]
# digits radiate from the center: odd left, even right — 9 7 5 3 1 | 0 2 4 6 8
1 = 9
2 = 7
3 = 5
4 = 3
5 = 1
6 = 0
7 = 2
8 = 4
9 = 6
0 = 8

[altgr]
# vim arrows on the keys that TYPE h j k l
h = left
dot = down
n = up
u = right

[fn1]
# hold the ,-key — F-row, nav, and the symbols the Piercing base drops
esc = f12
1 = f1
2 = f2
3 = f3
4 = f4
5 = f5
6 = f6
7 = f7
8 = f8
9 = f9
0 = f10
backspace = insert
u = right
p = minus
semicolon = equal
h = left
apostrophe = backslash
enter = grave
n = up
dot = down
up = leftbrace
rightalt = rightbrace
slash = playpause
# keyboard fallback for Enter, and middle-click on the left ball button
space = enter
leftmouse = middlemouse

[fn2]
# hold the c-key — numpad (right hand), matching the Preonic L2
7 = numlock
8 = slash
9 = S-8
0 = minus
backspace = insert
y = S-equal
u = 7
i = 8
o = 9
p = minus
semicolon = equal
h = minus
j = 4
k = 5
l = 6
apostrophe = backslash
enter = grave
n = dot
m = 1
comma = 2
dot = 3
up = leftbrace
rightalt = rightbrace
space = 0
slash = dot
