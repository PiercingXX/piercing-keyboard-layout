---
# Piercing squeekboard terminal layout — generated for github.com/PiercingXX/piercing-keyboard-layout
outlines:
    default:   { width: 54, height: 37 }
    halfwidth: { width: 27, height: 37 }
    special:   { width: 58, height: 37 }
    altline:   { width: 70, height: 37 }
    large:     { width: 70, height: 37 }
    action:    { width: 90, height: 37 }
    wide:      { width: 72, height: 37 }
    enterline: { width: 67.33, height: 37 }
    spaceline: { width: 134.67, height: 37 }
    small:     { width: 67.4, height: 22 }

views:
    base:
        - "TabSmall Ctrl Alt ↑ ↓ ← →"
        - "q r f w g ; l p y z"
        - "PeriodSmall a s e t d h n u i o MinusSmall"
        - ", c x v / k m b j ."
        - "BackSpace Shift_L preferences Return space show_actions show_numbers"
    upper:
        - "TabSmall Ctrl Alt PgUp PgDn Home End"
        - "Q R F W G colon L P Y Z"
        - "SlashSmall A S E T D H N U I O PipeSmall"
        - "< C X V ? K M B J >"
        - "BackSpace Shift_L preferences Return space show_actions show_numbers"
    numbers:
        - "TabSmall Ctrl Alt ↑ ↓ ← →"
        - "9 7 5 3 1 0 2 4 6 8"
        - "\\ * # $ / & - + ( ) _"
        - "show_symbols , \" ' colon ; ! ?"
        - "BackSpace preferences Return space period show_letters"
    symbols:
        - "TabSmall Ctrl Alt ↑ ↓ ← →"
        - "~ ` · √ π τ ÷ × ¶ @"
        - "© ® £ € ¥ ^ ° { }"
        - "show_numbers_from_symbols % | < > = [ ]"
        - "BackSpace preferences Return space period show_letters"
    actions:
        - "TabSmall Ctrl Alt PgUp PgDn Home End"
        - "F1  F2  F3  F4  F5  F6"
        - "F7  F8  F9  F10 F11 F12"
        - "Esc Tab Pause Insert Up Del"
        - "show_letters_actions Menu Break Left Down Right"

buttons:
    Shift_L:
        action:
            locking:
                lock_view: "upper"
                unlock_view: "base"
        outline: "altline"
        icon: "key-shift"
    BackSpace:
        outline: "altline"
        icon: "edit-clear-symbolic"
        action: erase
    preferences:
        action: "show_prefs"
        outline: "special"
        icon: "keyboard-mode-symbolic"
    show_numbers:
        action:
            set_view: "numbers"
        outline: "wide"
        label: "123"
    show_numbers_from_symbols:
        action:
            set_view: "numbers"
        outline: "altline"
        label: "123"
    show_letters:
        action:
            set_view: "base"
        outline: "wide"
        label: "ABC"
    show_symbols:
        action:
            set_view: "symbols"
        outline: "altline"
        label: "*/="
    space:
        outline: "spaceline"
        text: " "
    Return:
        outline: "enterline"
        icon: "key-enter"
        keysym: "Return"
    colon:
        text: ":"
    show_letters_actions:
        action:
            set_view: "base"
        outline: "wide"
        label: "ABC"
    show_actions:
        action:
            set_view: "actions"
        outline: "altline"
        label: ">_"
    period:
        outline: "special"
        text: "."
    F1:
        outline: "action"
        keysym: "F1"
    F2:
        outline: "action"
        keysym: "F2"
    F3:
        outline: "action"
        keysym: "F3"
    F4:
        outline: "action"
        keysym: "F4"
    F5:
        outline: "action"
        keysym: "F5"
    F6:
        outline: "action"
        keysym: "F6"
    F7:
        outline: "action"
        keysym: "F7"
    F8:
        outline: "action"
        keysym: "F8"
    F9:
        outline: "action"
        keysym: "F9"
    F10:
        outline: "action"
        keysym: "F10"
    F11:
        outline: "action"
        keysym: "F11"
    F12:
        outline: "action"
        keysym: "F12"
    Esc:
        outline: "action"
        keysym: "Escape"
    Tab:
        outline: "action"
        keysym: "Tab"
    TabSmall:
        outline: "small"
        keysym: "Tab"
        label: "Tab"
    Del:
        outline: "action"
        keysym: "Delete"
    Insert:
        outline: "action"
        keysym: "Insert"
    Menu:
        outline: "action"
        keysym: "Menu"
    Pause:
        outline: "action"
        keysym: "Pause"
    Break:
        outline: "action"
        keysym: "Break"
    Home:
        outline: "small"
        keysym: "Home"
    End:
        outline: "small"
        keysym: "End"
    PgUp:
        outline: "small"
        keysym: "Page_Up"
    PgDn:
        outline: "small"
        keysym: "Page_Down"
    "↑":
        outline: "small"
        keysym: "Up"
    "↓":
        outline: "small"
        keysym: "Down"
    "←":
        outline: "small"
        keysym: "Left"
    "→":
        outline: "small"
        keysym: "Right"
    Up:
        label: "↑"
        outline: "action"
        keysym: "Up"
    Left:
        label: "←"
        outline: "action"
        keysym: "Left"
    Down:
        label: "↓"
        outline: "action"
        keysym: "Down"
    Right:
        label: "→"
        outline: "action"
        keysym: "Right"
    Ctrl:
        modifier: "Control"
        outline: "small"
        label: "Ctrl"
    Alt:
        modifier: "Alt"
        outline: "small"
        label: "Alt"
    MinusSmall:
        outline: "halfwidth"
        text: "-"
    SlashSmall:
        outline: "halfwidth"
        text: "/"
    PipeSmall:
        outline: "halfwidth"
        text: "|"
    PeriodSmall:
        outline: "halfwidth"
        text: "."
    "\\":
        outline: "halfwidth"
    _:
        outline: "halfwidth"
