---
# Piercing squeekboard layout, PIN input hint — digits placed in the
# Piercing number-row order (9 7 5 3 1 0 2 4 6 8) in reading order.
margins: { top: 4, side: 0, bottom: 4 }
outlines:
    default: { width: 123.428, height: 52 }
    special: { width: 123.428, height: 52 }

views:
    base:
        - "9 7 5"
        - "3 1 0"
        - "2 4 6"
        - "BackSpace 8 Return"

buttons:
    BackSpace:
        outline: "special"
        icon: "edit-clear-symbolic"
        action: "erase"
    Return:
        outline: "special"
        icon: "key-enter"
        keysym: "Return"
