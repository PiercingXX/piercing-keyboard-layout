---
# Piercing squeekboard layout — generated for github.com/PiercingXX/piercing-keyboard-layout
outlines:
    default:   { width: 54, height: 42 }
    altline:   { width: 70, height: 42 }
    wide:      { width: 76, height: 42 }
    special:   { width: 58, height: 42 }
    enterline: { width: 69.33, height: 42 }
    spaceline: { width: 138.67, height: 42 }

views:
    base:
        - "q r f w g ; l p y z"
        - "a s e t d h n u i o"
        - ", c x v / k m b j ."
        - "BackSpace Shift_L preferences Return space slash show_numbers"
    upper:
        - "Q R F W G colon L P Y Z"
        - "A S E T D H N U I O"
        - "< C X V ? K M B J >"
        - "BackSpace Shift_L preferences Return space slash show_numbers"
    numbers:
        - "9 7 5 3 1 0 2 4 6 8"
        - "! @ # $ % ^ & * ( )"
        - "show_symbols - _ + = \" ' colon ?"
        - "BackSpace preferences Return space slash show_letters"
    symbols:
        - "~ ` | · √ π τ ÷ × ¶"
        - "© ® £ € ¥ ^ ° * { }"
        - "show_numbers_from_symbols \\ / < > = [ ]"
        - "BackSpace preferences Return space slash show_letters"

buttons:
    Shift_L:
        action:
            locking:
                lock_view: "upper"
                unlock_view: "base"
        outline: "altline"
        icon: "key-shift"
    BackSpace:
        outline: "altline"
        icon: "edit-clear-symbolic"
        action: erase
    preferences:
        action: "show_prefs"
        outline: "special"
        icon: "keyboard-mode-symbolic"
    show_numbers:
        action:
            set_view: "numbers"
        outline: "wide"
        label: "123"
    show_numbers_from_symbols:
        action:
            set_view: "numbers"
        outline: "altline"
        label: "123"
    show_letters:
        action:
            set_view: "base"
        outline: "wide"
        label: "ABC"
    show_symbols:
        action:
            set_view: "symbols"
        outline: "altline"
        label: "*/="
    space:
        outline: "spaceline"
        text: " "
    Return:
        outline: "enterline"
        icon: "key-enter"
        keysym: "Return"
    colon:
        text: ":"
    slash:
        outline: "special"
        text: "/"
