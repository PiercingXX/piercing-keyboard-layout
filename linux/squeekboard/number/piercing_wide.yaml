---
# Piercing squeekboard layout, number input hint (landscape) — digits placed in the
# Piercing number-row order (9 7 5 3 1 0 2 4 6 8) in reading order.
outlines:
    default:   { width: 71.314,  height: 52 }
    spaceline: { width: 142.628, height: 52 }
    special:   { width: 71.314,  height: 52 }

views:
    base:
        - "( 9 7 5 )"
        - "# 3 1 0 +"
        - "* 2 4 6 -"
        - "BackSpace 8 space Return"

buttons:
    BackSpace:
        outline: "special"
        icon: "edit-clear-symbolic"
        action: "erase"
    space:
        outline: "spaceline"
        text: " "
        label: "␣"
    Return:
        outline: "special"
        icon: "key-enter"
        keysym: "Return"
